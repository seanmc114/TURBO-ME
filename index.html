<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Turbo Me (up)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap">
  <h1>Turbo Me (up)</h1>
  <p class="sub">Talk about You. Practice. Enjoy. You have a lot to say.</p>

  <div class="grid" id="grid"></div>

  <div class="card dash">
    <div><strong>Total Stars:</strong> <span id="totalStars">0</span> ⭐</div>
    <div class="tiny">Tip: Dictation works here by recording audio and transcribing it through your Worker.</div>
    <button id="reset" class="ghost">Reset Progress</button>
  </div>
</main>

<footer>© 2026 Synge St Games — imagination and perseverance</footer>

<script>
  const THEMES = [
    { id:"yo",          icon:"🪞", title:"Yo y mi personalidad" },
    { id:"barrio",      icon:"🏠", title:"Mi barrio y mi casa" },
    { id:"instituto",   icon:"🎓", title:"Mi instituto" },
    { id:"familia",     icon:"👨‍👩‍👧‍👦", title:"Mi familia" },
    { id:"amigos",      icon:"👫", title:"Mis amigos" },
    { id:"tiempo",      icon:"⚽", title:"Tiempo libre" },
    { id:"vacaciones",  icon:"✈️", title:"Vacaciones y viajes" },
    { id:"salud",       icon:"💪", title:"Deporte y salud" },
    { id:"tecnologia",  icon:"📱", title:"Tecnología y redes" },
    { id:"comida",      icon:"🍽️", title:"Comida y vida diaria" },
    { id:"futuro",      icon:"🗺️", title:"Planes y futuro" }
  ];

  const totalStarsKey = "oral_totalStars";

  function getTotalStars(){ return Number(localStorage.getItem(totalStarsKey) || 0); }
  function getBest(theme, tense){ return Number(localStorage.getItem(`oral_best_${theme}_${tense}`) || 0); }

  function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    document.getElementById("totalStars").textContent = getTotalStars();

    THEMES.forEach(t=>{
      const btn = document.createElement("button");
      btn.className = "tile";
      btn.innerHTML = `
        <div class="tileTop">
          <div class="tileIcon">${t.icon}</div>
          <div>
            <div class="tileTitle">${t.title}</div>
            <div class="tileMeta">
              <span>Best ⭐: P ${"⭐".repeat(getBest(t.id,"present")) || "—"} · Pa ${"⭐".repeat(getBest(t.id,"past")) || "—"} · F ${"⭐".repeat(getBest(t.id,"future")) || "—"}</span>
            </div>
          </div>
        </div>
        <div class="tileCTA">Choose tense →</div>
      `;
      btn.addEventListener("click", ()=>{
        localStorage.setItem("oral_theme", t.id);
        window.location.href = "tense.html";
      });
      grid.appendChild(btn);
    });
  }

  document.getElementById("reset").addEventListener("click", ()=>{
    if(!confirm("Reset all stars and best scores on this device?")) return;
    localStorage.removeItem(totalStarsKey);
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith("oral_best_")) localStorage.removeItem(k);
      if(k.startsWith("oral_last_")) localStorage.removeItem(k);
    });
    render();
  });

  render();
</script>

</body>
</html>
