<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Turbo Me (up)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap playWrap">
  <div class="topBar">
    <button id="homeBtn" class="ghost" type="button">← Themes</button>
    <div class="pill" id="pill">Theme · Tense</div>
  </div>

  <h1>Turbo Me (up)</h1>
  <div class="turnLine">Turn <span id="turnNo">1</span>/3</div>

  <div class="taskBox taskBoxSolo">
    <span id="question">Loading question…</span>
    <button id="readQ" class="smallBtn" type="button">🔊</button>
  </div>

  <textarea id="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Speak (🎙) or type your answer in Spanish…"></textarea>

  <div class="controls">
    <button id="recordBtn" class="smallBtn" type="button">🎙 Dictate</button>
    <button id="submitBtn" type="button">Submit</button>
  </div>

  <section id="out" class="card hidden"></section>
</main>

<footer>© 2026 Synge St Games — imagination and perseverance</footer>

<script src="ai.js"></script>
<script src="script.js"></script>

</body>
</html>
