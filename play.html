<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Turbo Me (up)</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Turbo Me (up)</h1>

    <div id="intro">
      Talk about You. Practice. Enjoy. You have a lot to say.
    </div>

    <div id="turnInfo">Turn 1/3</div>

    <!-- QUESTION -->
    <div id="questionBox"></div>

    <!-- INPUT -->
    <textarea id="answerBox" placeholder="Speak or type your answer in Spanish…"></textarea>

    <div class="buttons">
      <button id="dictateBtn">🎙 Dictate</button>
      <button id="submitBtn">Submit</button>
    </div>

    <!-- FEEDBACK -->
    <div id="feedback"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
