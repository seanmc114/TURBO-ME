<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Choose Tense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap">
  <div class="topBar">
    <button id="backBtn" class="ghost" type="button">← Themes</button>
    <div class="pill" id="themePill">Theme</div>
  </div>

  <h1>Choose Tense</h1>
  <p class="sub">Pick the tense you want to practise.</p>

  <div class="grid3">
    <button class="tileSmall" type="button" data-tense="present">Present<br><span class="tiny">hablo / vivo / me gusta</span></button>
    <button class="tileSmall" type="button" data-tense="past">Past<br><span class="tiny">fui / hice / era</span></button>
    <button class="tileSmall" type="button" data-tense="future">Future<br><span class="tiny">voy a / me gustaría</span></button>
  </div>

  <div class="card">
    <div class="tiny">
      Dictation note: on iPhone Safari, browser dictation APIs don’t exist. This game records audio and transcribes via your Worker, so it still works.
    </div>
  </div>
</main>

<footer>© 2026 Synge St Games — imagination and perseverance</footer>

<script>
  const THEME_LABEL = {
    yo:"Yo y mi personalidad",
    barrio:"Mi barrio y mi casa",
    instituto:"Mi instituto",
    familia:"Mi familia",
    amigos:"Mis amigos",
    tiempo:"Tiempo libre",
    vacaciones:"Vacaciones y viajes",
    salud:"Deporte y salud",
    tecnologia:"Tecnología y redes",
    comida:"Comida y vida diaria",
    futuro:"Planes y futuro"
  };

  const theme = localStorage.getItem("oral_theme") || "yo";
  document.getElementById("themePill").textContent = THEME_LABEL[theme] || "Theme";

  document.getElementById("backBtn").addEventListener("click", ()=>window.location.href="index.html");

  document.querySelectorAll("[data-tense]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      localStorage.setItem("oral_tense", btn.dataset.tense);
      window.location.href = "play.html";
    });
  });
</script>

</body>
</html>
